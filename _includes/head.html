<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

<!-- 2.5-stable does not have the include custom-head.html directive, so we need to add the mermaid script here. In the -->
<!--   future, we can move this to a separate file and include it in the head.html file. -->

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true });
    // The following script converts standard markdown code blocks to the required <pre class="mermaid"> tag structure
    document.querySelectorAll('pre > code.language-mermaid').forEach((codeBlock) => {
      codeBlock.parentElement.outerHTML = `<pre class="mermaid">${codeBlock.textContent}</pre>`;
    });
  </script>
</head>
